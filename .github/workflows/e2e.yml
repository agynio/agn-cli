name: E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: service

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build agn binary
        working-directory: service
        run: go build -o dist/agn ./cmd/agn

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@0382a86ed54c603a30cceb91e2fe4eba8c2fd924

      - name: Run e2e tests
        uses: agynio/e2e/.github/actions/run-tests@main
        with:
          service: agn_cli
          agn-binary: service/dist/agn
